<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let token = localStorage.getItem('vi_token');
let userName = localStorage.getItem('vi_user');

if (token) showApp();

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('d-none');
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await r.json();
    if (!r.ok) { errEl.textContent = data.error || 'BĹ‚Ä…d logowania'; errEl.classList.remove('d-none'); return; }
    if (data.role !== 'admin') { errEl.textContent = 'Brak dostÄ™pu â€“ wymagana rola admin'; errEl.classList.remove('d-none'); return; }
    token = data.token;
    userName = data.driver_name;
    localStorage.setItem('vi_token', token);
    localStorage.setItem('vi_user', userName);
    showApp();
  } catch(e) { errEl.textContent = 'BĹ‚Ä…d poĹ‚Ä…czenia: ' + e.message; errEl.classList.remove('d-none'); }
}

function doLogout() {
  localStorage.removeItem('vi_token'); localStorage.removeItem('vi_user');
  location.reload();
}

function showApp() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('appView').style.display = 'block';
  document.getElementById('navUser').textContent = userName || '';
  document.querySelectorAll('#tabs .nav-link').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('#tabs .nav-link').forEach(x => x.classList.remove('active'));
      a.classList.add('active');
      loadTab(a.dataset.tab);
    });
  });
  loadTab('inspections');
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch('/api' + path, opts);
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.error || 'HTTP ' + r.status); }
  return r.json();
}

function loadTab(tab) {
  const el = document.getElementById('tabContent');
  el.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
  const loaders = {
    inspections: loadInspections,
    roadcards: loadRoadCards,
    expenses: loadExpenses,
    contacts: loadContacts,
    vehicles: loadVehicles,
    drivers: loadDrivers,
  };
  (loaders[tab] || (() => el.innerHTML = '<p>Nieznana zakĹ‚adka</p>'))();
}

function fmtDate(ms) {
  if (!ms) return 'â€”';
  return new Date(Number(ms) < 1e12 ? Number(ms)*1000 : Number(ms)).toLocaleString('pl-PL');
}
function fmtCreated(s) { return s ? new Date(Number(s)*1000).toLocaleString('pl-PL') : 'â€”'; }

// â”€â”€ INSPEKCJE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function loadInspections() {
  const data = await api('GET', '/inspections');
  const el = document.getElementById('tabContent');
  if (!data.length) { el.innerHTML = '<div class="section-card text-center text-muted py-5">Brak inspekcji</div>'; return; }

    </div>
    <div class="accordion" id="insp-acc">`;

  data.forEach((ins, i) => {
    const cl = ins.checklist || [];
    const checked = cl.filter(c => c.checked).length;
    const total = cl.length;
    const rc = ins.road_card || {};
    const insp = ins.inspection || {};
    const photos = ins.photos || [];

    html += `<div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button ${i===0?'':'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#ins${ins.id}">
          <span class="me-2">${fmtCreated(ins.created_at)}</span>
          <span class="badge bg-secondary me-2">${ins.registration || 'â€”'}</span>
          <span class="badge bg-warning text-dark me-2">Naczepa: ${esc(ins.trailer_registration || '-')}</span>
          <span class="badge bg-info me-2">${ins.fuel || 'â€”'}</span>
          <span class="me-2 text-muted">${ins.driver_name || 'â€”'}</span>
          <span class="badge ${checked===total&&total>0?'badge-ok':'badge-fail'} ms-auto">${checked}/${total} âś“</span>
        </button>
      </h2>
      <div id="ins${ins.id}" class="accordion-collapse collapse ${i===0?'show':''}">
        <div class="accordion-body">
          <div class="row">
            <div class="col-md-4">
              <h6>Inspekcja</h6>
              <ul class="list-unstyled small">
                <li>DowĂłd reje.: <b>${insp.registration_doc?'âś…':'âťŚ'}</b></li>
                <li>Tablet: <b>${insp.tablet?'âś…':'âťŚ'}</b></li>
                <li>Brak uszkodzeĹ„: <b>${insp.no_damage?'âś…':'âťŚ'}</b></li>
              </ul>
              <h6 class="mt-2">Checklista</h6>
              <div style="max-height:200px;overflow-y:auto">
                ${cl.map(c=>`<div class="small ${c.checked?'text-success':'text-danger'}">${c.checked?'âś…':'âťŚ'} ${c.text||''}</div>`).join('')||'<span class="text-muted small">Brak</span>'}
              </div>
            </div>
            <div class="col-md-4">
              <h6>Karta drogowa</h6>
              <div class="small">
                <div>Licznik start: <b>${rc.odometer_start||'â€”'}</b></div>
                <div>Licznik koniec: <b>${rc.odometer_end||'â€”'}</b></div>
                <div>Paliwo start: <b>${rc.fuel_start||'â€”'}</b></div>
                <div>Paliwo koniec: <b>${rc.fuel_end||'â€”'}</b></div>
              </div>
              ${(rc.points||[]).length ? `<h6 class="mt-2">Punkty trasy</h6>
              <table class="table table-sm">
                <thead><tr><th>ZaĹ‚adunek</th><th>RozĹ‚adunek</th><th>Przebieg</th><th>Start</th><th>Koniec</th></tr></thead>
                <tbody>${(rc.points||[]).map(p=>`<tr><td>${p.load_place||'â€”'}</td><td>${p.unload_place||'â€”'}</td><td>${p.odo_leg_km||'â€”'} km</td><td>${p.time_start||'â€”'}</td><td>${p.time_end||'â€”'}</td></tr>`).join('')}</tbody>
              </table>` : ''}
            </div>
            <div class="col-md-4">
              <h6>ZdjÄ™cia</h6>
              <div class="d-flex flex-wrap">
                ${photos.map(p=>`<div class="text-center me-1 mb-1">
                  <img src="${p.url}" class="photo-thumb" onclick="showPhoto('${p.url}','${p.field}')" title="${p.field}">
                  <div style="font-size:10px;color:#888">${p.field.replace('photo_','')}</div>
                </div>`).join('') || '<span class="text-muted small">Brak zdjÄ™Ä‡</span>'}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  });
  html += '</div></div>';
  el.innerHTML = html;
}

// â”€â”€ KARTY DROGOWE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

      <button class="btn btn-sm btn-outline-primary" onclick="loadTab('roadcards')">Odswiez</button>

  data.forEach((rc, i) => {

        <button class="accordion-button ${i===0?'':'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#rc${rc.id}">

          <span class="badge bg-info me-2">${esc(rc.fuel || '-')}</span>
          <span class="text-muted me-2">${esc(rc.driver_name || '-')}</span>
          <span class="badge bg-light text-dark ms-auto">${pts.length} pkt</span>
        </button>
      </h2>
      <div id="rc${rc.id}" class="accordion-collapse collapse ${i===0?'show':''}">
        <div class="accordion-body">
          <div class="row mb-3 g-2">
            <div class="col-auto"><span class="text-muted small">Wyjazd:</span> <b>${esc(rc.departure_datetime || '-')}</b></div>
            <div class="col-auto"><span class="text-muted small">Powrot:</span> <b>${esc(rc.return_datetime || '-')}</b></div>
            <div class="col-auto"><span class="text-muted small">Licznik start:</span> <b>${esc(rc.odometer_start || '-')}</b></div>

            <thead><tr><th>Zaladunek</th><th>Rozladunek</th><th>Przebieg</th><th>Km z lad.</th><th>Km puste</th><th>Godz. start</th><th>Godz. koniec</th></tr></thead>
            <tbody>${pts.map(p=>`<tr><td>${esc(p.load_place||'-')}</td><td>${esc(p.unload_place||'-')}</td><td>${esc(p.odo_leg_km||'-')} km</td><td>${esc(p.km_load||'-')}</td><td>${esc(p.km_empty||'-')}</td><td>${esc(p.time_start||'-')}</td><td>${esc(p.time_end||'-')}</td></tr>`).join('')}</tbody>
          </table>` : '<p class="text-muted small">Brak punktow</p>'}
        </div>
      </div>
    </div>`;
  });
  html += '</div></div>';
  el.innerHTML = html;
}

async function loadExpenses() {
  const data = await api('GET', '/expenses');
  const el = document.getElementById('tabContent');
  const labels = {
    fuel_purchase:'Zakup paliwa',
    card_expense:'Inne wydatki karta',
    cash_expense:'Wydatki gotowka',
    private_expense:'Wydatki prywatne',
    fuel:'Paliwo', carwash:'Myjnia', toll:'Oplata drogowa', parking:'Parking', receipt:'Paragon', other:'Inne'
  };
  let html = `<div class="section-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Wydatki (${data.length})</h5>
      <button class="btn btn-sm btn-outline-primary" onclick="loadTab('expenses')">Odswiez</button>
    </div>
    <table class="table table-hover">
      <thead><tr><th>Data</th><th>Kierowca</th><th>Pojazd</th><th>Typ</th><th>Platnosc</th><th>Kwota</th><th>Opis</th><th>Zdjecie</th></tr></thead>
      <tbody>`;

  data.forEach(e => {
    const typeLabel = labels[e.type] || e.type;
    const pay = [e.payment_method, e.payment_card].filter(Boolean).join(' / ') || '-';
    const amount = [e.amount, e.currency].filter(Boolean).join(' ') || '-';
    html += `<tr>
      <td>${fmtCreated(e.created_at)}</td>
      <td>${esc(e.driver_name || '-')}</td>
      <td>${esc(e.registration || '-')}</td>
      <td><span class="badge bg-secondary">${esc(typeLabel)}</span></td>
      <td>${esc(pay)}</td>
      <td>${esc(amount)}</td>
      <td>${esc(e.purpose || e.description || '-')}</td>
      <td>${e.photo_url?`<img src="${e.photo_url}" class="photo-thumb" onclick="showPhoto('${e.photo_url}','${esc(typeLabel)}')">`:'-'}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

      <button class="btn btn-sm btn-success" onclick="showAddContact()">+ Dodaj kontakt</button>
    </div>
    <div id="contactFormArea"></div>
    <table class="table table-hover" id="contactsTable">
      <thead><tr><th>Zdjecie</th><th>Imie i nazwisko</th><th>Rola</th><th>Telefon</th><th>Email</th><th>Akcje</th></tr></thead>
      <tbody>`;
  data.forEach(c => {
    const photo = c.photo_url ? `<img src="${esc(c.photo_url)}" class="photo-thumb" alt="">` : '<span class="text-muted small">brak</span>';
    html += `<tr id="cRow${c.id}">
      <td>${photo}</td>
      <td><b>${esc(c.name)}</b></td>
      <td><span class="badge bg-light text-dark">${esc(c.role)}</span></td>
      <td>${c.phone ? `<a href="tel:${esc(c.phone)}">${esc(c.phone)}</a>` : '-'}</td>
      <td>${c.email ? `<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>` : '-'}</td>
      <td>
        <button class="btn btn-xs btn-outline-primary btn-sm" onclick='editContact(${JSON.stringify(c)})'>Edytuj</button>
        <button class="btn btn-xs btn-outline-danger btn-sm ms-1" onclick="deleteContact(${c.id},'${esc(c.name)}')">Usun</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function showAddContact() {
  document.getElementById('contactFormArea').innerHTML = contactForm(null);
}
function editContact(c) {
  document.getElementById('contactFormArea').innerHTML = contactForm(c);
  document.getElementById('cf_name').value = c.name || '';
  document.getElementById('cf_role').value = c.role || '';
  document.getElementById('cf_phone').value = c.phone || '';
  document.getElementById('cf_email').value = c.email || '';
  document.getElementById('cf_photo_url').value = c.photo_url || '';
}
function contactForm(c) {
  const isEdit = c && c.id;
  return `<div class="card mb-3 border-primary">
    <div class="card-header bg-primary text-white small">${isEdit?'Edytuj kontakt':'+ Nowy kontakt'}</div>
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-md-3"><label class="form-label small">Imie i nazwisko *</label><input id="cf_name" class="form-control form-control-sm" placeholder="Imie i nazwisko *"></div>
        <div class="col-md-2"><label class="form-label small">Rola</label>
          <select id="cf_role" class="form-select form-select-sm">
            <option value="Spedytor">Spedytor</option>
            <option value="Sekretariat">Sekretariat</option>
            <option value="Dzial IT">Dzial IT</option>
            <option value="Serwis techniczny">Serwis techniczny</option>
            <option value="Inny">Inny</option>
          </select>
        </div>
        <div class="col-md-2"><label class="form-label small">Telefon</label><input id="cf_phone" class="form-control form-control-sm" placeholder="+48 123 123 123"></div>
        <div class="col-md-3"><label class="form-label small">Email</label><input id="cf_email" class="form-control form-control-sm" placeholder="email@firma.pl"></div>

        <div class="col-md-4"><label class="form-label small">Upload zdjecia</label><input id="cf_photo_file" type="file" accept="image/*" class="form-control form-control-sm"></div>
        <div class="col-md-3 d-flex gap-1">
          <button class="btn btn-sm btn-primary flex-fill" onclick="saveContact(${isEdit?c.id:'null'})">Zapisz</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('contactFormArea').innerHTML=''">Anuluj</button>
        </div>
      </div>
    </div>
  </div>`;
}
async function saveContact(id) {
  const body = {
    name: document.getElementById('cf_name').value.trim(),
    role: document.getElementById('cf_role').value,
    phone: document.getElementById('cf_phone').value.trim(),
    email: document.getElementById('cf_email').value.trim(),
    photo_url: document.getElementById('cf_photo_url').value.trim(),
  };
  if (!body.name) { alert('Podaj imie i nazwisko'); return; }
  try {
    let savedId = id;
    if (id) await api('PUT', `/contacts/${id}`, body);
    else {
      const created = await api('POST', '/contacts', body);
      savedId = created.id;
    }
    await uploadContactPhotoIfSelected(savedId);
    loadContacts();
  } catch(e) { alert('Blad: ' + e.message); }
}
async function uploadContactPhotoIfSelected(id) {
  const input = document.getElementById('cf_photo_file');
  if (!id || !input || !input.files || !input.files[0]) return;
  const fd = new FormData();
  fd.append('photo', input.files[0]);
  const r = await fetch(`/api/contacts/${id}/photo`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: fd
  });
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.error || 'HTTP ' + r.status); }
}
async function deleteContact(id, name) {
  if (!confirm(`Usun kontakt "${name}"?`)) return;
  try { await api('DELETE', `/contacts/${id}`); loadContacts(); } catch(e) { alert(e.message); }
}

async function addVehicle() {
  const reg = document.getElementById('v_reg').value.trim();
  const brand = document.getElementById('v_brand').value.trim();
  const fuel = document.getElementById('v_fuel').value;
  if (!reg) { alert('Podaj rejestracjÄ™'); return; }
  try {
    await api('POST', '/vehicles', { registration: reg, brand, fuel });
    loadVehicles();
  } catch(e) { alert('BĹ‚Ä…d: ' + e.message); }
}
async function deleteVehicle(id, plate) {
  if (!confirm(`UsuĹ„ pojazd ${plate}?`)) return;
  try { await api('DELETE', `/vehicles/${id}`); loadVehicles(); } catch(e) { alert(e.message); }
}
function showRouteForm(vehicleId, plate) {
  document.getElementById('routeFormArea').innerHTML = `
    <div class="card border-info mt-3">
      <div class="card-header bg-info text-white small">Przypisz trasÄ™ â€“ ${plate} (ID: ${vehicleId})</div>
      <div class="card-body">
        <div class="mb-2"><input id="rt_number" class="form-control form-control-sm" placeholder="Numer trasy (np. TRS-2024-001)"></div>
        <div class="mb-2">
          <label class="form-label small">Zdarzenia trasy (JSON array)</label>
          <textarea id="rt_events" class="form-control form-control-sm" rows="6" placeholder='[{"order_no":"ZL001","customer":"Firma XYZ","load_text":"ZAĹ: Hamburg (08:00-10:00)","unload_text":"ROZ: Warszawa (16:00-18:00)"}]'></textarea>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-info" onclick="saveRoute(${vehicleId})">Zapisz trasÄ™</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('routeFormArea').innerHTML=''">Anuluj</button>
        </div>
      </div>
    </div>`;
}
async function saveRoute(vehicleId) {
  const route_number = document.getElementById('rt_number').value.trim();
  let events = [];
  try { events = JSON.parse(document.getElementById('rt_events').value || '[]'); } catch { alert('BĹ‚Ä…d JSON w zdarzeniach'); return; }
  try {
    await api('POST', `/vehicles/${vehicleId}/orders`, { route_number, events });
    alert('Trasa zapisana!');
    document.getElementById('routeFormArea').innerHTML = '';
  } catch(e) { alert('BĹ‚Ä…d: ' + e.message); }
}

async function addDriver() {
  const body = {
    username: document.getElementById('d_user').value.trim(),
    password: document.getElementById('d_pass').value,
    name: document.getElementById('d_name').value.trim(),
    role: document.getElementById('d_role').value,
  };
  if (!body.username || !body.password || !body.name) { alert('WypeĹ‚nij login, hasĹ‚o i imiÄ™'); return; }
  try {
    await api('POST', '/drivers', body);
    loadDrivers();
  } catch(e) { alert('BĹ‚Ä…d: ' + e.message); }
}
async function changePass(id) {
  const pw = document.getElementById('pw' + id).value;
  if (!pw || pw.length < 6) { alert('HasĹ‚o min. 6 znakĂłw'); return; }
  try { await api('PUT', `/drivers/${id}/password`, { password: pw }); alert('HasĹ‚o zmienione'); } catch(e) { alert(e.message); }
}
async function deleteDriver(id, name) {
  if (!confirm(`UsuĹ„ kierowcÄ™ "${name}"?`)) return;
  try { await api('DELETE', `/drivers/${id}`); loadDrivers(); } catch(e) { alert(e.message); }
}
